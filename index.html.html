<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R6 Public Leaderboard</title>
<style>
:root{
  --bg:#070a0f;--panel:#111827;--panel2:#182235;--text:#f8fafc;--muted:#94a3b8;
  --line:#263244;--danger:#ef4444;--good:#22c55e;--input:#0b1220;
}
body.light{--bg:#f4f6fb;--panel:#ffffff;--panel2:#eef2ff;--text:#111827;--muted:#64748b;--line:#d7dce8;--input:#ffffff}
*{box-sizing:border-box}
body{margin:0;padding:18px;background:radial-gradient(circle at top,#1f2937 0%,var(--bg) 45%);color:var(--text);font-family:Inter,Arial,sans-serif}
.app{max-width:1200px;margin:auto}
.header{text-align:center;padding:18px;border:1px solid var(--line);background:linear-gradient(135deg,var(--panel),var(--panel2));border-radius:22px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
h1{margin:0;font-size:30px;letter-spacing:.5px}
.subtitle{margin-top:8px;color:var(--muted)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.card span{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
.card b{font-size:18px}
.controls{display:grid;grid-template-columns:1fr 220px auto;gap:10px;margin-bottom:14px}
input,select,button{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--input);color:var(--text);font-size:14px}
button{cursor:pointer;font-weight:700;background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.tablewrap{overflow:auto;border-radius:20px;border:1px solid var(--line);background:var(--panel)}
table{width:100%;border-collapse:collapse;min-width:850px}
th,td{padding:12px;border-bottom:1px solid var(--line);text-align:center}
th{background:var(--panel2);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.7px;position:sticky;top:0;z-index:2}
.rank{font-weight:900;font-size:18px}
.rank1{background:linear-gradient(90deg,rgba(250,204,21,.22),transparent)}
.rank2{background:linear-gradient(90deg,rgba(203,213,225,.18),transparent)}
.rank3{background:linear-gradient(90deg,rgba(251,146,60,.18),transparent)}
.teamcell{display:flex;align-items:center;justify-content:center;gap:8px}
.logo{width:32px;height:32px;object-fit:contain;border-radius:8px;background:rgba(255,255,255,.08)}
.kd.good,.wp.good{color:var(--good);font-weight:900}
.kd.bad,.wp.bad{color:var(--danger);font-weight:900}
.footer{color:var(--muted);text-align:center;font-size:12px;margin:14px 0}
.empty-state{padding:26px;text-align:center;color:var(--muted)}
@media(max-width:800px){body{padding:10px}h1{font-size:23px}.controls{grid-template-columns:1fr 1fr}.controls input{grid-column:1/3}button,select,input{font-size:13px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🏆 Rainbow Six Esports Leaderboard</h1>
    <div class="subtitle">Public read-only R6 stats leaderboard with team logos, K/D and win percentage.</div>
  </div>

  <div class="cards">
    <div class="card"><span>Top Killer</span><b id="topKiller">-</b></div>
    <div class="card"><span>Best K/D</span><b id="bestKD">-</b></div>
    <div class="card"><span>Best Win %</span><b id="bestWin">-</b></div>
    <div class="card"><span>Total Players</span><b id="totalPlayers">0</b></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search player or team..." />
    <select id="sort">
      <option value="kills_desc">Highest Kills</option>
      <option value="kills_asc">Lowest Kills</option>
      <option value="deaths_desc">Highest Deaths</option>
      <option value="deaths_asc">Lowest Deaths</option>
      <option value="kd_desc">Highest K/D</option>
      <option value="kd_asc">Lowest K/D</option>
      <option value="wins_desc">Highest Wins</option>
      <option value="wins_asc">Lowest Wins</option>
      <option value="losses_desc">Highest Losses</option>
      <option value="losses_asc">Lowest Losses</option>
      <option value="wp_desc">Highest Win %</option>
      <option value="wp_asc">Lowest Win %</option>
      <option value="team_az">Team A-Z</option>
      <option value="player_az">Player A-Z</option>
    </select>
    <button onclick="toggleTheme()">Dark/Light</button>
  </div>

  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Player</th><th>Team</th><th>Kills</th><th>Deaths</th><th>K/D</th><th>Wins</th><th>Losses</th><th>Win %</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">Public read-only version. Visitors can search and sort, but cannot edit the leaderboard.</div>
</div>

const savedTheme = localStorage.getItem("r6_public_theme");
if(savedTheme === "light") document.body.classList.add("light");

function getKD(p){ return p.deaths > 0 ? p.kills / p.deaths : p.kills; }
function getWP(p){ const total = p.wins + p.losses; return total > 0 ? (p.wins / total) * 100 : 0; }
function kdText(p){ return getKD(p).toFixed(2); }
function wpText(p){ return getWP(p).toFixed(1) + "%"; }

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("r6_public_theme", document.body.classList.contains("light") ? "light" : "dark");
}

  arr.sort((a,b)=>{
    switch(sort){
      case "kills_desc": return b.kills - a.kills;
      case "kills_asc": return a.kills - b.kills;
      case "deaths_desc": return b.deaths - a.deaths;
      case "deaths_asc": return a.deaths - b.deaths;
      case "kd_desc": return getKD(b) - getKD(a);
      case "kd_asc": return getKD(a) - getKD(b);
      case "wins_desc": return b.wins - a.wins;
      case "wins_asc": return a.wins - b.wins;
      case "losses_desc": return b.losses - a.losses;
      case "losses_asc": return a.losses - b.losses;
      case "wp_desc": return getWP(b) - getWP(a);
      case "wp_asc": return getWP(a) - getWP(b);
      case "team_az": return String(a.team || "").localeCompare(String(b.team || ""));
      case "player_az": return String(a.player || "").localeCompare(String(b.player || ""));
      default: return b.kills - a.kills;
    }
  });
  return arr;
}

function render(){
  const tbody = document.getElementById("tbody");
  const arr = sortedPlayers();
  tbody.innerHTML = "";

  if(!arr.length){
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state">No players to show.</td></tr>`;
  }

  arr.forEach((p,rank)=>{
    const kdClass = getKD(p) >= 1 ? "good" : "bad";
    const wpClass = getWP(p) >= 50 ? "good" : "bad";
    const rowClass = rank === 0 ? "rank1" : rank === 1 ? "rank2" : rank === 2 ? "rank3" : "";
    tbody.innerHTML += `
      <tr class="${rowClass}">
        <td class="rank">${rank+1}</td>
        <td>${escapeHtml(p.player || "Unknown")}</td>
        <td><div class="teamcell">${p.logo ? `<img class="logo" src="${p.logo}" alt="Team logo">` : ""}<span>${escapeHtml(p.team || "Team")}</span></div></td>
        <td>${Number(p.kills) || 0}</td>
        <td>${Number(p.deaths) || 0}</td>
        <td class="kd ${kdClass}">${kdText(p)}</td>
        <td>${Number(p.wins) || 0}</td>
        <td>${Number(p.losses) || 0}</td>
        <td class="wp ${wpClass}">${wpText(p)}</td>
      </tr>
    `;
  });

  document.getElementById("totalPlayers").textContent = players.length;
  if(players.length){
    const topK = [...players].sort((a,b)=>b.kills-a.kills)[0];
    const bestKD = [...players].sort((a,b)=>getKD(b)-getKD(a))[0];
    const bestWP = [...players].sort((a,b)=>getWP(b)-getWP(a))[0];
    document.getElementById("topKiller").textContent = `${topK.player} (${topK.kills})`;
    document.getElementById("bestKD").textContent = `${bestKD.player} (${kdText(bestKD)})`;
    document.getElementById("bestWin").textContent = `${bestWP.player} (${wpText(bestWP)})`;
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("sort").addEventListener("change",render);
render();
</script>
</body>
</html>
